<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>조의금 방명록</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a1a; --paper: #f5f0e8; --cream: #ede8dc;
    --muted: #8a8478; --accent: #4a4035; --gold: #b89a5a;
    --line: #d4cfc6; --white: #fdfbf7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--paper); color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif; min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(180,160,110,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(100,90,70,0.1) 0%, transparent 60%);
  }

  /* LOADING */
  #loadingScreen { position:fixed; inset:0; background:var(--paper); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px; z-index:9999; transition:opacity .4s; }
  #loadingScreen.hide { opacity:0; pointer-events:none; }
  .loading-dot { width:8px; height:8px; background:var(--gold); border-radius:50%; display:inline-block; margin:0 3px; animation:blink 1.2s infinite; }
  .loading-dot:nth-child(2){animation-delay:.2s} .loading-dot:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
  .loading-text { font-family:'Noto Serif KR',serif; font-size:13px; letter-spacing:3px; color:var(--muted); }

  /* ADMIN BAR */
  .admin-bar { display:none; background:var(--accent); color:var(--paper); padding:10px 20px; text-align:center; font-family:'Noto Serif KR',serif; font-size:12px; letter-spacing:3px; position:sticky; top:0; z-index:200; gap:16px; align-items:center; justify-content:center; }
  .admin-bar.visible { display:flex; }
  .btn-logout { background:none; border:1px solid rgba(255,255,255,0.4); color:var(--paper); padding:3px 12px; font-size:11px; letter-spacing:2px; cursor:pointer; font-family:'Noto Sans KR',sans-serif; transition:border-color .2s; }
  .btn-logout:hover { border-color:var(--paper); }

  /* HEADER */
  header { text-align:center; padding:48px 24px 0; position:relative; }
  header::before { content:''; display:block; width:1px; height:32px; background:var(--gold); margin:0 auto 20px; }
  .header-badge { display:inline-block; border:1px solid var(--gold); color:var(--gold); font-family:'Noto Serif KR',serif; font-size:11px; letter-spacing:4px; padding:4px 16px; margin-bottom:16px; }
  header h1 { font-family:'Noto Serif KR',serif; font-weight:700; font-size:clamp(24px,5vw,36px); color:var(--accent); letter-spacing:6px; margin-bottom:8px; }
  header p { font-size:13px; color:var(--muted); letter-spacing:2px; margin-bottom:32px; }

  /* TABS */
  .tab-bar {
    display: flex;
    max-width: 760px;
    margin: 0 auto;
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  .tab-btn {
    flex: 1;
    padding: 16px 20px;
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 3px;
    color: var(--muted);
    position: relative;
    transition: color .2s, font-weight .2s;
  }
  .tab-btn::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 2px;
    background: var(--gold);
    transform: scaleX(0);
    transition: transform .25s ease;
  }
  .tab-btn.active { color: var(--accent); font-weight:700; font-size:15px; }
  .tab-btn:hover { color: var(--accent); }
  .tab-badge {
    display: inline-block;
    background: var(--gold);
    color: var(--white);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 10px;
    padding: 1px 6px;
    margin-left: 6px;
    vertical-align: middle;
    letter-spacing: 0;
    min-width: 20px;
    text-align: center;
  }

  .container { max-width:760px; margin:0 auto; padding:0 20px 60px; }

  /* TAB PANELS */
  .tab-panel { display:none; padding-top: 32px; }
  .tab-panel.active { display:block; animation: panelIn .3s ease; }
  @keyframes panelIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  /* SUMMARY */
  .summary-bar { display:flex; gap:1px; background:var(--line); margin-bottom:28px; border:1px solid var(--line); }
  .summary-item { flex:1; background:var(--white); padding:18px 20px; text-align:center; }
  .summary-label { font-size:11px; color:var(--muted); letter-spacing:2px; display:block; margin-bottom:6px; }
  .summary-value { font-family:'Noto Serif KR',serif; font-size:22px; font-weight:600; color:var(--accent); }
  .summary-total { display:block; background:linear-gradient(135deg,var(--white) 0%,#f8f3e8 100%); }
  .summary-total.admin-visible { display:block; }

  /* FORM */
  .form-section { background:var(--white); border:1px solid var(--line); padding:32px; margin-bottom:28px; position:relative; }
  .form-section::before { content:'기록하기'; position:absolute; top:-10px; left:24px; background:var(--white); padding:0 10px; font-size:11px; letter-spacing:3px; color:var(--gold); font-family:'Noto Serif KR',serif; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
  .form-group { display:flex; flex-direction:column; gap:6px; }
  .form-group label { font-size:11px; letter-spacing:2px; color:var(--muted); }
  .form-group input,.form-group select,.form-group textarea { background:var(--paper); border:1px solid var(--line); border-radius:0; padding:10px 14px; font-family:'Noto Sans KR',sans-serif; font-size:14px; color:var(--ink); outline:none; transition:border-color .2s; width:100%; }
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus { border-color:var(--gold); background:var(--white); }
  .form-group textarea { resize:vertical; min-height:70px; line-height:1.6; }
  .form-full { grid-column:1/-1; }
  .amount-presets { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
  .amount-presets button { background:var(--cream); border:1px solid var(--line); padding:5px 12px; font-family:'Noto Sans KR',sans-serif; font-size:12px; color:var(--muted); cursor:pointer; transition:all .15s; border-radius:0; }
  .amount-presets button:hover { background:var(--accent); color:var(--paper); border-color:var(--accent); }
  .amount-preview { margin-top:6px; font-family:'Noto Serif KR',serif; font-size:15px; color:var(--gold); font-weight:600; letter-spacing:1px; min-height:22px; }
  .btn-add { width:100%; padding:13px; background:var(--accent); color:var(--paper); border:none; cursor:pointer; font-family:'Noto Serif KR',serif; font-size:14px; letter-spacing:4px; margin-top:8px; transition:background .2s,transform .1s; }
  .btn-add:hover { background:#2e2820; }
  .btn-add:active { transform:scale(.99); }
  .btn-add:disabled { background:var(--muted); cursor:not-allowed; }

  /* 기록 완료 안내 */
  .success-hint { text-align:center; padding:16px; background:var(--white); border:1px solid var(--line); color:var(--muted); font-size:13px; letter-spacing:1px; margin-top:16px; display:none; }
  .success-hint.show { display:block; animation:panelIn .3s ease; }
  .success-hint a { color:var(--gold); cursor:pointer; text-decoration:underline; }

  /* SEARCH */
  .search-section { margin-bottom:20px; position:relative; }
  .search-section input { width:100%; background:var(--white); border:1px solid var(--line); border-radius:0; padding:12px 44px 12px 16px; font-family:'Noto Sans KR',sans-serif; font-size:14px; color:var(--ink); outline:none; transition:border-color .2s; }
  .search-section input:focus { border-color:var(--gold); }
  .search-icon { position:absolute; right:14px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:16px; pointer-events:none; }

  /* LIST */
  .list-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .list-title { font-family:'Noto Serif KR',serif; font-size:13px; letter-spacing:3px; color:var(--muted); }
  .count-badge { font-size:12px; color:var(--muted); background:var(--cream); padding:3px 10px; border:1px solid var(--line); }
  .list-empty { text-align:center; padding:60px 20px; color:var(--muted); font-size:13px; letter-spacing:1px; border:1px dashed var(--line); background:var(--white); }
  .list-empty::before { content:'◇'; display:block; font-size:20px; color:var(--line); margin-bottom:12px; }
  .entry-card { background:var(--white); border:1px solid var(--line); padding:20px 24px; margin-bottom:8px; display:grid; grid-template-columns:auto 1fr auto; gap:0 20px; align-items:start; animation:fadeIn .3s ease; }
  @keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  .entry-index { font-family:'Noto Serif KR',serif; font-size:11px; color:var(--gold); padding-top:3px; min-width:24px; }
  .entry-name { font-family:'Noto Serif KR',serif; font-size:17px; font-weight:600; color:var(--accent); margin-bottom:4px; }
  .entry-meta { display:flex; gap:10px; align-items:center; margin-bottom:6px; flex-wrap:wrap; }
  .entry-relation { font-size:11px; letter-spacing:1px; color:var(--muted); background:var(--cream); padding:2px 8px; border:1px solid var(--line); }
  .entry-amount { display:inline-block; font-family:'Noto Serif KR',serif; font-size:15px; font-weight:600; color:var(--gold); background:var(--cream); border:1px solid #e0d9c8; padding:2px 10px; letter-spacing:1px; }
  .entry-amount-empty { display:inline-block; font-size:11px; color:#b07030; letter-spacing:1px; background:#fdf6ee; border:1px solid #e8d5b8; padding:2px 8px; }
  .entry-message { font-size:13px; color:#5a544a; line-height:1.6; font-style:italic; }
  .entry-message::before{content:'" ';color:var(--gold)} .entry-message::after{content:' "';color:var(--gold)}
  .entry-actions { display:flex; flex-direction:column; gap:6px; }
  .btn-delete { background:none; border:1px solid var(--line); color:var(--muted); font-size:12px; padding:4px 10px; cursor:pointer; font-family:'Noto Sans KR',sans-serif; letter-spacing:1px; transition:all .2s; }
  .btn-delete:hover { border-color:#c0392b; color:#c0392b; }
  .btn-edit { background:none; border:1px solid var(--line); color:var(--muted); font-size:12px; padding:4px 10px; cursor:pointer; font-family:'Noto Sans KR',sans-serif; letter-spacing:1px; transition:all .2s; }
  .btn-edit:hover { border-color:var(--gold); color:var(--gold); }

  /* 금액 수정 모달 */
  .edit-modal-overlay { display:none; position:fixed; inset:0; background:rgba(20,16,10,0.65); z-index:600; align-items:center; justify-content:center; backdrop-filter:blur(3px); }
  .edit-modal-overlay.open { display:flex; }
  .edit-modal-box { background:var(--white); border:1px solid var(--line); padding:36px 32px 28px; width:100%; max-width:340px; position:relative; animation:modalIn .25s ease; }
  .edit-close-btn { position:absolute; top:14px; right:16px; background:none; border:none; font-size:18px; color:var(--muted); cursor:pointer; line-height:1; padding:4px; transition:color .2s; }
  .edit-close-btn:hover { color:var(--accent); }
  .edit-modal-box::before { content:'금액 수정'; position:absolute; top:-10px; left:24px; background:var(--white); padding:0 10px; font-size:11px; letter-spacing:3px; color:var(--gold); font-family:'Noto Serif KR',serif; }
  .edit-name { font-family:'Noto Serif KR',serif; font-size:17px; font-weight:600; color:var(--accent); margin-bottom:20px; }
  .edit-presets { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; margin-bottom:4px; }
  .edit-presets button { background:var(--cream); border:1px solid var(--line); padding:5px 12px; font-family:'Noto Sans KR',sans-serif; font-size:12px; color:var(--muted); cursor:pointer; transition:all .15s; border-radius:0; }
  .edit-presets button:hover { background:var(--accent); color:var(--paper); border-color:var(--accent); }
  .edit-preview { font-family:'Noto Serif KR',serif; font-size:14px; color:var(--gold); font-weight:600; min-height:20px; margin-top:6px; margin-bottom:16px; letter-spacing:1px; }
  .btn-edit-save { width:100%; padding:12px; background:var(--gold); color:var(--white); border:none; cursor:pointer; font-family:'Noto Serif KR',serif; font-size:14px; letter-spacing:4px; transition:background .2s; margin-bottom:10px; }
  .btn-edit-save:hover { background:#a08040; }

  /* ADMIN BUTTON */
  .admin-trigger { position:fixed; bottom:24px; right:24px; background:var(--accent); color:var(--paper); border:none; width:44px; height:44px; font-size:18px; cursor:pointer; opacity:.55; transition:opacity .2s,transform .2s; z-index:100; display:flex; align-items:center; justify-content:center; }
  .admin-trigger:hover { opacity:1; transform:scale(1.08); }

  /* MODAL */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(20,16,10,0.65); z-index:500; align-items:center; justify-content:center; backdrop-filter:blur(3px); }
  .modal-overlay.open { display:flex; }
  .modal-box { background:var(--white); border:1px solid var(--line); padding:40px 36px 32px; width:100%; max-width:360px; position:relative; animation:modalIn .25s ease; }
  @keyframes modalIn{from{opacity:0;transform:translateY(-16px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
  .modal-box::before { content:'관리자'; position:absolute; top:-10px; left:24px; background:var(--white); padding:0 10px; font-size:11px; letter-spacing:3px; color:var(--gold); font-family:'Noto Serif KR',serif; }
  .modal-title { font-family:'Noto Serif KR',serif; font-size:18px; font-weight:600; color:var(--accent); letter-spacing:3px; margin-bottom:24px; text-align:center; }
  .modal-group { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
  .modal-group label { font-size:11px; letter-spacing:2px; color:var(--muted); }
  .modal-group input { background:var(--paper); border:1px solid var(--line); padding:10px 14px; font-family:'Noto Sans KR',sans-serif; font-size:14px; color:var(--ink); outline:none; width:100%; transition:border-color .2s; }
  .modal-group input:focus { border-color:var(--gold); background:var(--white); }
  .modal-error { font-size:12px; color:#c0392b; letter-spacing:1px; min-height:18px; margin-bottom:10px; text-align:center; }
  .btn-login { width:100%; padding:12px; background:var(--accent); color:var(--paper); border:none; cursor:pointer; font-family:'Noto Serif KR',serif; font-size:14px; letter-spacing:4px; transition:background .2s; margin-bottom:10px; }
  .btn-login:hover { background:#2e2820; }
  .btn-modal-close { display:block; width:100%; background:none; border:1px solid var(--line); padding:9px; font-family:'Noto Sans KR',sans-serif; font-size:12px; letter-spacing:2px; color:var(--muted); cursor:pointer; transition:border-color .2s; }
  .btn-modal-close:hover { border-color:var(--accent); color:var(--accent); }

  /* TOP 버튼 */
  .btn-top { position:fixed; bottom:80px; right:24px; background:var(--white); border:1px solid var(--line); color:var(--muted); width:44px; height:44px; font-size:16px; cursor:pointer; opacity:0; transition:opacity .3s, transform .2s; z-index:100; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
  .btn-top.show { opacity:1; }
  .btn-top:hover { color:var(--accent); border-color:var(--accent); transform:translateY(-2px); }

  /* TOAST */
  #toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--accent); color:var(--paper); padding:12px 28px; font-size:13px; letter-spacing:2px; font-family:'Noto Serif KR',serif; opacity:0; transition:all .3s; pointer-events:none; z-index:999; white-space:nowrap; }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  @media(max-width:520px){
    .form-row{grid-template-columns:1fr}
    .form-section{padding:24px 18px}
    .entry-card{grid-template-columns:auto 1fr; row-gap:10px;}
    .entry-actions{grid-column:1/-1; display:flex; flex-direction:row; gap:8px; border-top:1px solid var(--line); padding-top:10px; margin-top:2px;}
    .btn-edit{flex:1; text-align:center; padding:7px 0;}
    .btn-delete{display:none;}
    .summary-value{font-size:18px}
    .tab-btn{font-size:11px; padding:14px 10px; letter-spacing:2px;}
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>


<div id="loadingScreen">
  <div class="loading-text">방명록 불러오는 중</div>
  <div><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div>
</div>

<div class="admin-bar" id="adminBar">
  <span>🔐 관리자 모드</span>
  <button class="btn-logout" onclick="exportExcel()">📥 엑셀 저장</button>
  <button class="btn-logout" onclick="adminLogout()">로그아웃</button>
</div>

<header>
  <div class="header-badge">CONDOLENCE BOOK</div>
  <h1>조의금 방명록</h1>
  <p>조문해 주신 분들을 기록합니다</p>
</header>

<!-- 탭 바 -->
<div class="tab-bar">
  <button class="tab-btn active" id="tab-write" onclick="switchTab('write')">기 록 하 기</button>
  <button class="tab-btn" id="tab-list" onclick="switchTab('list')">방 명 록 <span class="tab-badge" id="tabBadge">0</span></button>
  <button class="tab-btn" id="tab-expense" onclick="switchTab('expense')">지 출 <span class="tab-badge" id="expenseBadge">0</span></button>
</div>

<div class="container">

  <!-- 기록하기 탭 -->
  <div class="tab-panel active" id="panel-write">
    <div class="summary-bar">
      <div class="summary-item">
        <span class="summary-label">총 조문객</span>
        <span class="summary-value" id="totalCount">—</span>
      </div>
      <div class="summary-item">
        <span class="summary-label">총 조의금</span>
        <span class="summary-value" id="totalAmount" style="font-size:17px;">—</span>
      </div>
      <div class="summary-item">
        <span class="summary-label">총 지출</span>
        <span class="summary-value" id="totalExpense" style="font-size:17px;color:#c0392b;">—</span>
      </div>
      <div class="summary-item summary-total">
        <span class="summary-label">잔 액</span>
        <span class="summary-value" id="balanceAmount" style="font-size:17px;color:var(--gold);">—</span>
      </div>
    </div>

    <div class="form-section">
      <div class="form-row">
        <div class="form-group">
          <label>성함 * <span style="font-size:11px;color:var(--muted);font-weight:normal;">(봉투에 적혀진 그대로 입력)</span></label>
          <input type="text" id="inputName" placeholder="홍길동" maxlength="20">
        </div>
        <div class="form-group">
          <label>관계</label>
          <select id="inputRelation">
            <option value="">선택</option>
            <option>가족</option><option>친척</option><option>친구</option>
            <option>직장동료</option><option>학교동문</option><option>이웃</option>
            <option>기타</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group form-full">
          <label>조의금 (원, 선택)</label>
          <input type="number" id="inputAmount" placeholder="50000" min="0" step="10000" inputmode="numeric" oninput="updateAmountPreview()">
          <div class="amount-presets">
            <button type="button" onclick="setAmount(50000)">5만</button>
            <button type="button" onclick="setAmount(100000)">10만</button>
            <button type="button" onclick="setAmount(200000)">20만</button>
            <button type="button" onclick="setAmount(300000)">30만</button>
            <button type="button" onclick="setAmount(500000)">50만</button>
            <button type="button" onclick="setAmount(1000000)">100만</button>
            <button type="button" onclick="setAmount(1500000)">150만</button>
          </div>
          <div id="amountPreview" class="amount-preview"></div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group form-full">
          <label>한마디 (선택)</label>
          <textarea id="inputMessage" placeholder="삼가 고인의 명복을 빕니다." maxlength="200"></textarea>
        </div>
      </div>
      <button class="btn-add" id="btnAdd" onclick="addEntry()">기 록 하 기</button>
    </div>

    <div class="success-hint" id="successHint">
      기록이 완료되었습니다 &nbsp;·&nbsp; <a onclick="switchTab('list')">방명록 보기 →</a>
    </div>
  </div>

  <!-- 방명록 탭 -->
  <div class="tab-panel" id="panel-list">
    <div class="search-section">
      <input type="text" id="searchInput" placeholder="이름 또는 관계로 검색..." oninput="renderList()">
      <span class="search-icon">🔍</span>
    </div>
    <div class="list-header">
      <span class="list-title">방 명 록</span>
      <span class="count-badge" id="filteredCount">0명</span>
    </div>
    <div id="entryList"></div>
  </div>

  <!-- 지출 탭 -->
  <div class="tab-panel" id="panel-expense">
    <div class="form-section" style="margin-bottom:28px;">
      <div class="form-row">
        <div class="form-group">
          <label>항목명 *</label>
          <input type="text" id="expenseName" placeholder="도우미 비용, 식대 등" maxlength="30">
        </div>
        <div class="form-group">
          <label>금액 (원) *</label>
          <input type="number" id="expenseAmount" placeholder="100000" min="0" inputmode="numeric" oninput="updateExpensePreview()">
          <div class="amount-preview" id="expensePreview"></div>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:16px;">
        <label>메모 (선택)</label>
        <input type="text" id="expenseMemo" placeholder="간단한 메모" maxlength="50">
      </div>
      <div class="amount-presets">
        <button type="button" onclick="setExpenseAmount(50000)">5만</button>
        <button type="button" onclick="setExpenseAmount(100000)">10만</button>
        <button type="button" onclick="setExpenseAmount(200000)">20만</button>
        <button type="button" onclick="setExpenseAmount(300000)">30만</button>
        <button type="button" onclick="setExpenseAmount(500000)">50만</button>
      </div>
      <button class="btn-add" onclick="addExpense()">지 출 기 록 하 기</button>
    </div>

    <div class="list-header">
      <span class="list-title">지출 내역</span>
      <span class="count-badge" id="expenseCount">0건</span>
    </div>
    <div id="expenseList"><div class="list-empty">지출 내역이 없어요</div></div>
  </div>

</div>
<button class="btn-top" id="btnTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">▲</button>
<button class="admin-trigger" id="adminTrigger" onclick="openAdminModal()" title="관리자">🔑</button>

<!-- 금액 수정 모달 -->
<div class="edit-modal-overlay" id="editModal">
  <div class="edit-modal-box">
    <button class="edit-close-btn" onclick="closeEditModal()">✕</button>
    <div class="edit-name" id="editName"></div>
    <div class="modal-group">
      <label>성함</label>
      <input type="text" id="editName2" placeholder="홍길동" maxlength="20">
    </div>
    <div class="modal-group">
      <label>관계</label>
      <select id="editRelation">
        <option value="">선택</option>
        <option>가족</option><option>친척</option><option>친구</option>
        <option>직장동료</option><option>학교동문</option><option>이웃</option>
        <option>송정익</option><option>송건익</option><option>기타</option>
      </select>
    </div>
    <div class="modal-group">
      <label>조의금 (원)</label>
      <input type="text" id="editAmount" placeholder="50,000" oninput="formatEditAmount()">
      <div class="edit-presets">
        <button type="button" onclick="setEditAmount(50000)">5만</button>
        <button type="button" onclick="setEditAmount(100000)">10만</button>
        <button type="button" onclick="setEditAmount(200000)">20만</button>
        <button type="button" onclick="setEditAmount(300000)">30만</button>
        <button type="button" onclick="setEditAmount(500000)">50만</button>
        <button type="button" onclick="setEditAmount(1000000)">100만</button>
        <button type="button" onclick="setEditAmount(1500000)">150만</button>
      </div>
      <div class="edit-preview" id="editPreview"></div>
    </div>
    <button class="btn-edit-save" onclick="saveAmount()">저 장 하 기</button>
    <div style="text-align:right; margin-top:16px; padding-top:16px; border-top:1px solid var(--line);">
      <button onclick="deleteFromModal()" id="modalDeleteBtn" style="background:none; border:none; font-size:11px; color:var(--muted); cursor:pointer; letter-spacing:1px; font-family:'Noto Sans KR',sans-serif; text-decoration:underline; display:none;">이 항목 삭제</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="adminModal">
  <div class="modal-box">
    <div class="modal-title">관리자 확인</div>
    <div class="modal-group">
      <label>비밀번호</label>
      <input type="password" id="loginPw" placeholder="비밀번호 입력" autocomplete="current-password">
    </div>
    <div class="modal-error" id="loginError"></div>
    <button class="btn-login" onclick="doLogin()">확 인</button>
    <button class="btn-modal-close" onclick="closeAdminModal()">닫기</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, deleteDoc, updateDoc, doc, getDoc,
  onSnapshot, query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB1wl0aW7EY2QFGdcjhMOBl66g96C_Bflg",
  authDomain: "sopungbugo.firebaseapp.com",
  projectId: "sopungbugo",
  storageBucket: "sopungbugo.firebasestorage.app",
  messagingSenderId: "726872101146",
  appId: "1:726872101146:web:cbd7fcc97007c35e611ca3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// URL에서 부고장 ID 추출
const params = new URLSearchParams(location.search);
const bugoId = params.get('id');
if (!bugoId) {
  document.body.innerHTML = '<div style="text-align:center;padding:80px;font-family:sans-serif;color:#8a8478;">잘못된 접근입니다.<br>부고장 링크를 확인해주세요.</div>';
  throw new Error('No bugoId');
}

// 부고장별 컬렉션
const colRef = collection(db, "bugos", bugoId, "condolences");

// Firebase에서 비밀번호 가져오기
let ADMIN_PW = '';
getDoc(doc(db, 'bugos', bugoId)).then(snap => {
  if (snap.exists()) ADMIN_PW = snap.data().password || '';
});

let isAdmin = false;
let entries = [];

// 실시간 수신
const q = query(colRef, orderBy("createdAt", "desc"));
onSnapshot(q, (snapshot) => {
  entries = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
  renderList();
  updateSummary();
  document.getElementById('tabBadge').textContent = entries.length;
  const ls = document.getElementById('loadingScreen');
  ls.classList.add('hide');
  setTimeout(() => ls.style.display = 'none', 400);
}, (err) => {
  console.error(err);
  document.getElementById('loadingScreen').classList.add('hide');
});

// 지출 리스너
const expenseRef = collection(db, 'bugos', bugoId, 'expenses');
const expenseQ = query(expenseRef, orderBy('createdAt', 'desc'));
onSnapshot(expenseQ, (snapshot) => {
  expenses = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
  renderExpenses();
  updateSummary();
});

// 탭 전환
window.switchTab = function(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'list') renderList();
};

// 추가
window.addEntry = async function() {
  const name = document.getElementById('inputName').value.trim();
  if (!name) { showToast('성함을 입력해 주세요'); return; }
  const btn = document.getElementById('btnAdd');
  btn.disabled = true; btn.textContent = '저장 중...';
  try {
    await addDoc(colRef, {
      name,
      relation: document.getElementById('inputRelation').value,
      amount: parseInt(document.getElementById('inputAmount').value) || 0,
      message: document.getElementById('inputMessage').value.trim(),
      date: today(),
      time: new Date().toLocaleTimeString('ko-KR', { timeZone: 'Asia/Seoul', hour:'2-digit', minute:'2-digit' }),
      createdAt: serverTimestamp()
    });
    document.getElementById('inputName').value = '';
    document.getElementById('inputRelation').value = '';
    document.getElementById('inputAmount').value = '';
    document.getElementById('inputMessage').value = '';
    document.getElementById('amountPreview').textContent = '';
    document.getElementById('inputName').focus();
    // 완료 안내 표시
    const hint = document.getElementById('successHint');
    hint.classList.add('show');
    setTimeout(() => hint.classList.remove('show'), 4000);
    showToast(name + ' 님을 기록했습니다');
  } catch(e) {
    showToast('저장 실패. 잠시 후 다시 시도해주세요.');
    console.error(e);
  }
  btn.disabled = false; btn.textContent = '기 록 하 기';
};

// 삭제
window.deleteEntry = async function(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  try {
    await deleteDoc(doc(db, 'bugos', bugoId, 'condolences', id));
    showToast('삭제되었습니다');
  } catch(e) { showToast('삭제 실패.'); }
};

// 관리자
window.openAdminModal = function() {
  if (isAdmin) { adminLogout(); return; }
  document.getElementById('loginPw').value = '';
  document.getElementById('loginError').textContent = '';
  document.getElementById('adminModal').classList.add('open');
  setTimeout(() => document.getElementById('loginPw').focus(), 100);
};
window.closeAdminModal = function() {
  document.getElementById('adminModal').classList.remove('open');
};
window.doLogin = function() {
  const pw = document.getElementById('loginPw').value;
  if (pw && pw === ADMIN_PW) {
    isAdmin = true; closeAdminModal(); applyAdminMode();
    showToast('관리자로 로그인했습니다');
  } else {
    document.getElementById('loginError').textContent = '비밀번호가 틀렸습니다';
    document.getElementById('loginPw').value = '';
    document.getElementById('loginPw').focus();
  }
};
window.adminLogout = function() {
  isAdmin = false; applyAdminMode(); showToast('로그아웃 되었습니다');
};
function applyAdminMode() {
  document.getElementById('adminBar').classList.toggle('visible', isAdmin);
  document.querySelector('.summary-total').classList.toggle('admin-visible', isAdmin);
  document.getElementById('adminTrigger').textContent = isAdmin ? '🔓' : '🔑';
  const delBtn = document.getElementById('modalDeleteBtn');
  if (delBtn) delBtn.style.display = isAdmin ? 'inline-block' : 'none';
  renderList(); updateSummary();
}

// 렌더링
window.renderList = function() {
  const q2 = document.getElementById('searchInput').value.trim().toLowerCase();
  const filtered = entries.filter(e =>
    e.name?.toLowerCase().includes(q2) || (e.relation && e.relation.includes(q2))
  );
  document.getElementById('filteredCount').textContent = filtered.length + '명';
  const el = document.getElementById('entryList');
  if (filtered.length === 0) {
    el.innerHTML = '<div class="list-empty">아직 기록된 분이 없습니다</div>';
    el.className = ''; return;
  }
  el.className = isAdmin ? 'admin-mode' : '';
  el.innerHTML = filtered.map((e, i) => `
    <div class="entry-card">
      <div class="entry-index">${String(filtered.length - i).padStart(2,'0')}</div>
      <div class="entry-main">
        <div class="entry-name">${escHtml(e.name)}</div>
        <div class="entry-meta">
          ${e.relation ? `<span class="entry-relation">${escHtml(e.relation)}</span>` : ''}
          ${e.amount ? `<span class="entry-amount">${formatMoney(e.amount)}원</span>` : `<span class="entry-amount-empty">금액 미입력</span>`}
          <span style="font-size:11px;color:var(--muted)">${formatDateTime(e.date, e.time)}</span>
        </div>
        ${e.message ? `<div class="entry-message">${escHtml(e.message)}</div>` : ''}
      </div>
      ${isAdmin ? `
      <div class="entry-actions">
        <button class="btn-edit" onclick="openEditModal('${e.id}', '${escHtml(e.name)}', ${e.amount||0}, '${escHtml(e.relation||'')}')">수정</button>
        ${isAdmin ? `<button class="btn-delete" onclick="deleteEntry('${e.id}')">삭제</button>` : ''}
      </div>` : ''}
    </div>`).join('');
};

// 엑셀 내보내기
window.exportExcel = function() {
  if (!entries.length) { showToast('내보낼 데이터가 없습니다'); return; }

  const header = ['번호', '성함', '관계', '조의금(원)'];
  const rows = [...entries].reverse().map((e, i) => [
    i + 1,
    e.name || '',
    e.relation || '',
    e.amount || 0
  ]);

  // CSV 생성 (Excel에서 바로 열림, 한글 깨짐 방지 BOM 포함)
  const csvContent = [header, ...rows]
    .map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))
    .join('\n');

  const BOM = '\uFEFF';
  const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `조의금방명록_${today()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('엑셀 파일이 저장되었습니다');
};
let editTargetId = null;
window.openEditModal = function(id, name, amount, relation) {
  editTargetId = id;
  document.getElementById('editName').textContent = name + ' 님';
  document.getElementById('editName2').value = name;
  document.getElementById('editRelation').value = relation || '';
  document.getElementById('editAmount').value = amount ? amount.toLocaleString('ko-KR') : '';
  updateEditPreview();
  document.getElementById('editModal').classList.add('open');
  setTimeout(() => document.getElementById('editName2').focus(), 100);
};
window.closeEditModal = function() {
  document.getElementById('editModal').classList.remove('open');
  editTargetId = null;
};
window.formatEditAmount = function() {
  const input = document.getElementById('editAmount');
  const raw = input.value.replace(/[^0-9]/g, '');
  if (raw) input.value = parseInt(raw).toLocaleString('ko-KR');
  else input.value = '';
  updateEditPreview();
};
window.setEditAmount = function(val) {
  document.getElementById('editAmount').value = val.toLocaleString('ko-KR');
  updateEditPreview();
};
window.updateEditPreview = function() {
  const raw = document.getElementById('editAmount').value.replace(/[^0-9]/g, '');
  const val = parseInt(raw) || 0;
  document.getElementById('editPreview').textContent = val > 0 ? formatMoney(val) + ' 원' : '';
};
window.deleteFromModal = async function() {
  if (!editTargetId) return;
  if (!confirm('삭제하시겠습니까?')) return;
  try {
    await deleteDoc(doc(db, "entries", editTargetId));
    closeEditModal();
    showToast('삭제되었습니다');
  } catch(e) { showToast('삭제 실패.'); }
};
window.saveAmount = async function() {
  if (!editTargetId) return;
  const raw = document.getElementById('editAmount').value.replace(/[^0-9]/g, '');
  const amount = parseInt(raw) || 0;
  const name = document.getElementById('editName2').value.trim();
  const relation = document.getElementById('editRelation').value;
  if (!name) { showToast('성함을 입력해 주세요'); return; }
  try {
    await updateDoc(doc(db, "bugos", bugoId, "condolences", editTargetId), { amount, name, relation });
    closeEditModal();
    showToast('저장되었습니다');
  } catch(e) {
    showToast('저장 실패. 다시 시도해주세요.');
    console.error(e);
  }
};

let expenses = [];

window.setExpenseAmount = function(val) {
  document.getElementById('expenseAmount').value = val;
  updateExpensePreview();
};
window.updateExpensePreview = function() {
  const val = parseInt(document.getElementById('expenseAmount').value) || 0;
  document.getElementById('expensePreview').textContent = val > 0 ? formatMoney(val) + ' 원' : '';
};

window.addExpense = async function() {
  const name = document.getElementById('expenseName').value.trim();
  const amount = parseInt(document.getElementById('expenseAmount').value) || 0;
  const memo = document.getElementById('expenseMemo').value.trim();
  if (!name) { showToast('항목명을 입력해주세요'); return; }
  if (!amount) { showToast('금액을 입력해주세요'); return; }
  try {
    await addDoc(collection(db, 'bugos', bugoId, 'expenses'), {
      name, amount, memo,
      date: today(),
      createdAt: new Date().toISOString()
    });
    document.getElementById('expenseName').value = '';
    document.getElementById('expenseAmount').value = '';
    document.getElementById('expenseMemo').value = '';
    document.getElementById('expensePreview').textContent = '';
    showToast('지출이 기록됐어요');
  } catch(e) {
    console.error(e);
    showToast('기록 중 오류가 발생했어요');
  }
};

window.deleteExpense = async function(id) {
  if (!confirm('이 지출 항목을 삭제할까요?')) return;
  try {
    await deleteDoc(doc(db, 'bugos', bugoId, 'expenses', id));
    showToast('삭제됐어요');
  } catch(e) { showToast('삭제 실패'); }
};

function renderExpenses() {
  const el = document.getElementById('expenseList');
  document.getElementById('expenseCount').textContent = expenses.length + '건';
  document.getElementById('expenseBadge').textContent = expenses.length;
  if (!expenses.length) { el.innerHTML = '<div class="list-empty">지출 내역이 없어요</div>'; return; }
  el.innerHTML = expenses.map((e, i) => `
    <div class="entry-card">
      <div class="entry-index">${String(expenses.length - i).padStart(2,'0')}</div>
      <div class="entry-main">
        <div class="entry-name" style="font-size:15px;">${escHtml(e.name)}</div>
        <div class="entry-meta">
          <span class="entry-amount" style="color:#c0392b;border-color:#f5c6c6;background:#fff5f5;">${formatMoney(e.amount)}원</span>
          <span style="font-size:11px;color:var(--muted)">${e.date || ''}</span>
        </div>
        ${e.memo ? `<div class="entry-message">${escHtml(e.memo)}</div>` : ''}
      </div>
      ${isAdmin ? `<div class="entry-actions"><button class="btn-delete" onclick="deleteExpense('${e.id}')">삭제</button></div>` : ''}
    </div>`).join('');
}

function updateSummary() {
  document.getElementById('totalCount').textContent = entries.length;
  const total = entries.reduce((s, e) => s + (e.amount||0), 0);
  const totalExp = expenses.reduce((s, e) => s + (e.amount||0), 0);
  const balance = total - totalExp;
  document.getElementById('totalAmount').textContent = formatMoney(total) + '원';
  document.getElementById('totalExpense').textContent = formatMoney(totalExp) + '원';
  document.getElementById('balanceAmount').textContent = formatMoney(balance) + '원';
}

window.setAmount = function(val) {
  document.getElementById('inputAmount').value = val; updateAmountPreview();
};
window.updateAmountPreview = function() {
  const val = parseInt(document.getElementById('inputAmount').value)||0;
  document.getElementById('amountPreview').textContent = val > 0 ? formatMoney(val)+' 원' : '';
};
function formatDateTime(date, time) {
  if (!date) return '';
  const parts = date.split('-'); // 2026-04-25
  const mmdd = parts[1] + '/' + parts[2]; // 04/25
  return time ? mmdd + ' ' + time : mmdd;
}
function formatMoney(n) { return n.toLocaleString('ko-KR'); }
function today() {
  return new Date().toLocaleDateString('ko-KR', { timeZone: 'Asia/Seoul', year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\. /g, '-').replace('.', '');
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
window.showToast = function(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
};

document.addEventListener('keydown', e => {
  if (e.key==='Enter' && document.getElementById('adminModal').classList.contains('open')) doLogin();
  if (e.key==='Escape') { closeAdminModal(); closeEditModal(); }
});
document.getElementById('inputName').addEventListener('keydown', e => {
  if (e.key==='Enter') addEntry();
});

// TOP 버튼
window.addEventListener('scroll', () => {
  document.getElementById('btnTop').classList.toggle('show', window.scrollY > 300);
});
</script>
</body>
</html>
